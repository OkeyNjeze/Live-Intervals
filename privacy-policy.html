<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Intervals — Privacy Policy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #f4f9f4;
      color: #2d2d2d;
      line-height: 1.8;
    }

    header {
      background-color: #00B050;
      padding: 40px 20px;
      text-align: center;
      color: white;
    }

    /* NEW */
    .header-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .header-title img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    header h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    header p {
      margin-top: 8px;
      font-size: 14px;
      opacity: 0.85;
    }

    .badge {
      display: inline-block;
      margin-top: 16px;
      background-color: white;
      color: #00B050;
      font-weight: 700;
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 20px;
    }

    .container {
      max-width: 820px;
      margin: 40px auto;
      padding: 0 20px 60px;
    }

    .meta-card {
      background: white;
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 32px;
      border-left: 5px solid #00B050;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .meta-card .meta-item label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
      display: block;
      margin-bottom: 2px;
    }

    .meta-card .meta-item span {
      font-size: 14px;
      font-weight: 600;
      color: #2d2d2d;
    }

    .section {
      background: white;
      border-radius: 16px;
      padding: 32px 36px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      transition: box-shadow 0.2s;
    }

    .section:hover {
      box-shadow: 0 4px 20px rgba(0,176,80,0.1);
    }

    .section-number {
      display: inline-block;
      background-color: #00B050;
      color: white;
      font-size: 12px;
      font-weight: 700;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      text-align: center;
      line-height: 28px;
      margin-right: 10px;
    }

    .section h2 {
      font-size: 18px;
      font-weight: 700;
      color: #00B050;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
    }

    .section h3 {
      font-size: 15px;
      font-weight: 700;
      color: #2d2d2d;
      margin: 20px 0 10px;
    }

    .section p {
      font-size: 15px;
      color: #444;
      margin-bottom: 12px;
    }

    .section ul {
      padding-left: 0;
      list-style: none;
      margin-top: 8px;
    }

    .section ul li {
      font-size: 15px;
      color: #444;
      padding: 8px 0 8px 28px;
      position: relative;
      border-bottom: 1px solid #f0f0f0;
    }

    .section ul li:last-child {
      border-bottom: none;
    }

    .section ul li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #00B050;
      font-weight: 700;
    }

    .section ul li strong {
      color: #2d2d2d;
    }

    .highlight-box {
      background-color: #f0faf4;
      border: 1px solid #c8ecd6;
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 16px;
      font-size: 14px;
      color: #2d6a45;
    }

    .contact-card {
      background: linear-gradient(135deg, #00B050, #007a38);
      border-radius: 16px;
      padding: 32px 36px;
      color: white;
      text-align: center;
      margin-bottom: 20px;
    }

    .contact-card h2 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .contact-card p {
      font-size: 15px;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .contact-card a {
      display: inline-block;
      background: white;
      color: #00B050;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 28px;
      border-radius: 30px;
      text-decoration: none;
      transition: transform 0.2s;
    }

    .contact-card a:hover {
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 13px;
      color: #aaa;
      border-top: 1px solid #e8e8e8;
    }

    footer span {
      color: #00B050;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 24px; }
      .meta-card { grid-template-columns: 1fr; }
      .section { padding: 24px 20px; }
      .contact-card { padding: 24px 20px; }
      .header-title img { width: 32px; height: 32px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <img src="App%20icon%201.png" alt="App Icon">
    <h1>Live Intervals</h1>
  </div>
  <p>Your family's safety, always.</p>
  <div class="badge">Privacy Policy</div>
</header>

<div class="container">

  <!-- EVERYTHING BELOW IS YOUR ORIGINAL CODE (UNCHANGED) -->

      <label>Effective Date</label>
      <span>March 13, 2026</span>
    </div>
    <div class="meta-item">
      <label>Last Updated</label>
      <span>March 13, 2026</span>
    </div>
    <div class="meta-item">
      <label>App Name</label>
      <span>Live Intervals</span>
    </div>
    <div class="meta-item">
      <label>Company</label>
      <span>Njeze Technologies</span>
    </div>
    <div class="meta-item">
      <label>Contact</label>
      <span>liveintervals@gmail.com</span>
    </div>
    <div class="meta-item">
      <label>Country</label>
      <span>Nigeria</span>
    </div>
  </div>

  <!-- (rest of your sections remain exactly as you wrote them) -->

</div>

<footer>

</footer>

</body>
</html>
